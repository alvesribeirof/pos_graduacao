<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ NanoChat</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
    <!-- PDF.js para processar PDFs extraindo texto -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <script type="importmap">
        {
            "imports": {
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1",
                "chromadb": "https://cdn.jsdelivr.net/npm/chromadb@1.8.1/+esm"
            }
        }
    </script>
</head>

<body>
    <div class="container">
        <div class="left-panel">
            <h1>✨ NanoChat</h1>

            <form id="question-form">
                <div class="parameters">
                    <div class="param-group">
                        <label for="temperature">Temperature: <span id="temp-value"
                                class="value-display"></span></label>
                        <input type="range" id="temperature" name="temperature" step="0.1">
                        <div class="param-description">Controla a criatividade das respostas. Valores baixos = mais
                            focado,
                            valores altos = mais criativo</div>
                    </div>

                    <div class="param-group">
                        <label for="topK">Top K: <span id="topk-value" class="value-display"></span></label>
                        <input type="number" id="topK" name="topK">
                        <div class="param-description">Limita a seleção às K palavras mais prováveis. Valores menores =
                            mais
                            previsível</div>
                    </div>
                </div>

                <div class="file-input-group">
                    <label>📎 Anexar Arquivo (Imagem, Áudio ou PDF):</label>
                    <div class="file-input-wrapper">
                        <input type="file" id="file-input" accept="image/*,audio/*,application/pdf" hidden>
                        <button type="button" class="file-upload-btn" id="file-upload-btn">
                            <span class="upload-icon">📁</span>
                            <span class="upload-text">Escolher arquivo</span>
                        </button>
                        <span class="file-selected-name" id="file-selected-name"></span>
                    </div>
                    <div class="file-preview" id="file-preview"></div>
                </div>

                <label for="question">Converse com ela:</label>
                <textarea name="question" id="question" placeholder="Digite sua pergunta aqui..."></textarea>

                <button type="submit" id="ask-button">Enviar</button>
            </form>

            <footer class="copyright">
                Erick Wendel - Engenharia de Software com IA Aplicada - UNIPDS - <span id="year"></span>
            </footer>
        </div>

        <div class="right-panel">
            <div id="output"></div>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
